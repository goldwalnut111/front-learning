<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex布局</title>
    <style>
        .box{
            display: flex;
            /* 弹性盒子在侧轴方向没有尺寸才能拉伸 */
            /* align-items: stretch; */

            align-items: center;
            height: 300px;
            border: 1px solid #000;

        }

        .box{
            width: 200px;
            height: 100px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
    </div>
</body>
</html>
