<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="block">默认内容</div>
    <p>默认内容</p>
    <p>默认内容</p>
    <p>默认内容</p>
    <p>默认内容</p>

    <script>
        var block=document.getElementById("block");//用id获取标签
        console.log(block)

        //修改文本内容
        block.textContent='JS设置的文本'

        //根据标签名获取
        // var contents=document.getElementsByTagName('p')
        var contents=document.querySelectorAll('#container p')

        console.log(contents)


        var textarr=[
            "第一个设置的标签",
            "第二个设置的标签",
            "第三个设置的标签",
            "第四个设置的标签"

        ]



        //内容设置，修改文本
        // for(var i=0;i<contents.length;i++){
        //     contents[i].textContent='用for循环设置的新文本'
        // }

        for(var i=0;i<contents.length;i++){
            contents[i].textContent=textarr[i]
        }

    </script>
</body>
</html>
