<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型</title>

    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: pink;
/* 内容与盒子边缘之间 */
            padding: 20px;



            /* 边框线 */
            /* 实线 */
            /* border: 1px solid #000; */
            /* 虚线 */
            border: 1px dashed red;
            /* 点线 */
            border: 2px dotted red;


            /* 外边距 ，出现在盒子外面，拉开两个盒子的距离*/
            /* 外边距不会撑大盒子 */
            /* margin: 20px; */
            /* 版心居中*/
            margin:0 auto; 



/* 内减模式：不需要手动减法，加padding和border不会撑大盒子 */
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div>div标签</div>
</body>
</html>
